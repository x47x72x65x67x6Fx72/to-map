<!DOCTYPE html>
<html lang="de">
<head>
    <!--Meta-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive-To-Map</title>
    
    <!--Libs, CSS-->
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="src/main.css">
</head>

<body>
    <nav>
        <!--Different Modi Operandi-->
        <span>Map Viewer</span>
    </nav>
    <main>

        <div class="options">
            <!--Section that holds all the elements to modify or e.g. search... -->
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="text" id="search-input" placeholder="Search Node..." onkeyup="if(event.key === 'Enter') searchNode()">
                <button onclick="searchNode()">Suchen</button>
            </div>
        </div>

        <div class="content">
            <!--Section that holds the main content-->
            <div id="detail" class="detail">
                <!--Node-Details-->
                <strong id="detail_name">MY WORLD</strong>
                <div id="detail_area"></div>
                <div id="detail_bosses"></div>
                <div id="detail_mobs"></div>
            </div>
            <div id="network" class="network"><!--Graph--></div>
        </div>


    </main>
    <!--JS-->
    <script type="text/javascript" src="res/iruna.js"></script>
    <script type="text/javascript" src="src/main.js"></script>


</html>
